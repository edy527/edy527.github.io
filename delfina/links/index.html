<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Delfi Molteni PH · Enlaces</title>
  <meta name="description" content="Fotógrafa · Fotografía de productos, eventos sociales y gastronomía." />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Delfi Molteni PH" />
  <meta property="og:description" content="Fotógrafa · Productos, eventos sociales y gastronomía." />
  <meta property="og:image" content="../img/uploads/congreso.jpg" />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📷</text></svg>" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root{
      --ink:#1b1613; --white:#fffdf9; --accent:#c07a53; --accent-deep:#a9603f;
      --serif:"Fraunces",Georgia,serif; --sans:"Inter",system-ui,-apple-system,sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{
      font-family:var(--sans); color:var(--white); min-height:100svh;
      -webkit-font-smoothing:antialiased; position:relative; overflow-x:hidden;
      display:flex; align-items:flex-start; justify-content:center;
      padding:clamp(1.4rem,5vw,3rem) 1.2rem clamp(2.5rem,6vw,4rem);
    }
    /* Fondo: collage de sus fotos, oscurecido */
    body::before{
      content:""; position:fixed; inset:0; z-index:-2;
      background:url("../img/uploads/collage.jpg") center/cover no-repeat;
      transform:scale(1.05); filter:saturate(1.02);
    }
    body::after{
      content:""; position:fixed; inset:0; z-index:-1;
      background:
        radial-gradient(120% 80% at 50% 0%, rgba(20,14,10,.55), rgba(16,11,8,.82) 60%, rgba(12,9,7,.92) 100%);
      backdrop-filter:blur(3px);
    }
    .wrap{width:100%; max-width:480px; text-align:center; animation:rise .7s cubic-bezier(.2,.7,.2,1) both}
    @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

    .avatar{
      width:118px; height:118px; border-radius:50%; margin:0 auto .95rem;
      object-fit:cover; border:3px solid rgba(255,255,255,.9);
      box-shadow:0 10px 40px rgba(0,0,0,.45);
    }
    .name{font-family:var(--serif); font-weight:400; font-size:clamp(1.9rem,7vw,2.5rem); letter-spacing:.01em; line-height:1.05}
    .role{
      text-transform:uppercase; letter-spacing:.26em; font-size:.72rem; font-weight:500;
      color:rgba(255,255,255,.82); margin:.6rem 0 0;
    }
    .bio{
      font-size:.98rem; line-height:1.6; color:rgba(255,255,255,.9);
      max-width:34ch; margin:1rem auto 0; text-wrap:balance;
    }

    /* Iconos sociales */
    .socials{display:flex; gap:1.1rem; justify-content:center; margin:1.3rem 0 .4rem}
    .socials a{
      width:44px; height:44px; display:grid; place-items:center; border-radius:50%;
      background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.22);
      color:var(--white); transition:transform .2s, background .2s;
      -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px);
    }
    .socials a:hover{transform:translateY(-2px); background:rgba(255,255,255,.22)}
    .socials svg{width:21px; height:21px}

    /* Botones de enlaces */
    .links{display:flex; flex-direction:column; gap:.85rem; margin-top:1.6rem}
    .btn{
      display:flex; align-items:center; gap:.9rem; width:100%;
      padding:1.05rem 1.15rem; border-radius:16px; text-decoration:none;
      font-size:1rem; font-weight:500; letter-spacing:.01em;
      background:rgba(255,255,255,.13); border:1px solid rgba(255,255,255,.24);
      color:var(--white); -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px);
      transition:transform .2s ease, background .25s ease, box-shadow .25s ease;
    }
    .btn:hover{transform:translateY(-2px); background:rgba(255,255,255,.22); box-shadow:0 12px 30px rgba(0,0,0,.35)}
    .btn:active{transform:translateY(0)}
    .btn__ic{width:26px; height:26px; flex:0 0 26px; display:grid; place-items:center}
    .btn__ic svg{width:24px; height:24px}
    .btn__label{flex:1; text-align:center; padding-right:26px}
    /* Botón principal (portafolio) */
    .btn--primary{
      background:linear-gradient(135deg, var(--accent), var(--accent-deep));
      border-color:transparent; font-weight:600;
    }
    .btn--primary:hover{background:linear-gradient(135deg, #cd875f, #b56a3f)}

    .foot{margin-top:2rem; font-size:.72rem; letter-spacing:.14em; text-transform:uppercase; color:rgba(255,255,255,.5)}
    .foot a{color:rgba(255,255,255,.7); text-decoration:none}
  </style>
</head>
